<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-label="Chad Lefort terminal">
  <title>Chad Lefort — Senior Frontend Engineer</title>
  <defs>
    <style>
      .outer { fill: #21252b; }
      .menu { fill: #1a1d23; }
      .tab-active { fill: #4ec9b0; }
      .tab-text-active { fill: #0d1117; }
      .tab-inactive { fill: #21252b; }
      .tab-text-inactive { fill: #cccccc; opacity: 0.8; }
      .status { fill: #3a3e48; }
      .term { fill: #282c34; }
      .fg { fill: #cccccc; }
      .comment { fill: #9da5b4; }
      .prompt { fill: #4ec9b0; }
      .branch { fill: #dcdcaa; }
      .add { fill: #4ec9b0; }
      .del { fill: #f44748; }
      .info { fill: #93c5fd; }
      .sep { fill: #626977; }
      .mac-red { fill: #ff5f57; }
      .mac-yellow { fill: #febc2e; }
      .mac-green { fill: #28c840; }
      .mono {
        font-family: "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;
        font-size: 15px;
      }
      .mono-status { font-size: 13px; }
      .mono-tab { font-size: 13px; font-weight: 600; }
      .bold { font-weight: 700; }
      .cursor { fill: #cccccc; animation: blink 1s linear infinite; }
      @keyframes blink {
        0%, 40% { opacity: 0; }
        50%, 90% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
    <clipPath id="clip">
      <rect x="0" y="0" width="1200" height="680" rx="16" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect class="outer" width="1200" height="680" />

    <!-- menu bar with traffic lights + tabs -->
    <rect class="menu" x="0" y="0" width="1200" height="54" />
    <circle class="mac-red" cx="28" cy="27" r="7" />
    <circle class="mac-yellow" cx="52" cy="27" r="7" />
    <circle class="mac-green" cx="76" cy="27" r="7" />

    <!-- active tab -->
    <path class="tab-active" d="M110,54 L110,22 Q110,14 118,14 L320,14 Q328,14 328,22 L328,54 Z" />
    <text class="mono mono-tab tab-text-active" x="146" y="38">chadlefort.com</text>

    <!-- inactive tabs -->
    <path class="tab-inactive" d="M340,54 L340,24 Q340,18 346,18 L498,18 Q504,18 504,24 L504,54 Z" />
    <text class="mono mono-tab tab-text-inactive" x="356" y="40">1  nvim</text>

    <path class="tab-inactive" d="M516,54 L516,24 Q516,18 522,18 L700,18 Q706,18 706,24 L706,54 Z" />
    <text class="mono mono-tab tab-text-inactive" x="532" y="40">2  ~/dotfiles</text>

    <path class="tab-inactive" d="M718,54 L718,24 Q718,18 724,18 L900,18 Q906,18 906,24 L906,54 Z" />
    <text class="mono mono-tab tab-text-inactive" x="734" y="40">3  ~/projects</text>

    <!-- status bar -->
    <rect class="term" x="0" y="54" width="1200" height="52" />
    <rect class="status" x="24" y="66" width="1080" height="28" rx="14" />
    <g class="mono mono-status">
      <text class="fg" x="48" y="85">clefort</text>
      <text class="sep" x="120" y="85">❯</text>
      <text class="fg" x="140" y="85">~/development/chadlefort.com</text>
      <text class="sep" x="394" y="85">❯</text>
      <text class="branch" x="414" y="85">⎇ v2</text>
      <text class="sep" x="470" y="85">❯</text>
      <text class="add" x="490" y="85">+ 13</text>
      <text class="sep" x="536" y="85">❯</text>
      <text class="del" x="556" y="85">- 0</text>
    </g>

    <!-- terminal body -->
    <rect class="term" x="0" y="106" width="1200" height="574" />

    <g class="mono">
      <!-- prompt typed command -->
      <text x="32" y="144">
        <tspan class="prompt">→</tspan>
        <tspan class="fg" dx="8">cat ABOUT.md</tspan>
      </text>

      <!-- h1 -->
      <text x="32" y="186" class="bold">
        <tspan class="prompt"># </tspan>
        <tspan class="fg">Chad Lefort</tspan>
      </text>

      <!-- summary paragraph -->
      <text class="comment" x="32" y="222">Senior frontend engineer from Mandeville, Louisiana with 13+ years of experience.</text>

      <!-- h2 -->
      <text x="32" y="266" class="bold">
        <tspan class="prompt">## </tspan>
        <tspan class="fg">About</tspan>
      </text>

      <!-- blockquotes -->
      <text x="32" y="304">
        <tspan class="prompt">&gt; </tspan>
        <tspan class="comment">Shortly after I was given my first computer, I developed a strong passion for programming.</tspan>
      </text>

      <text x="32" y="344">
        <tspan class="prompt">&gt; </tspan>
        <tspan class="comment">I'm constantly furthering my skills to keep up with the ever changing demand the web has.</tspan>
      </text>

      <text x="32" y="384">
        <tspan class="prompt">&gt; </tspan>
        <tspan class="comment">I enjoy the feeling of accomplishment when programming, and I take pride in writing</tspan>
      </text>
      <text class="comment" x="32" y="410">maintainable and efficient code.</text>

      <text x="32" y="450">
        <tspan class="prompt">&gt; </tspan>
        <tspan class="comment">Committed to team success, I prioritize delivering exceptional products that provide</tspan>
      </text>
      <text class="comment" x="32" y="476">an outstanding user experience.</text>

      <!-- trailing prompt + cursor -->
      <text x="32" y="520">
        <tspan class="prompt">→</tspan>
      </text>
      <rect class="cursor" x="52" y="506" width="9" height="18" />
    </g>
  </g>
</svg>
