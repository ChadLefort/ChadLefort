<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="Chad Lefort terminal">
  <title>Chad Lefort — Senior Frontend Engineer</title>
  <defs>
    <style>
      .outer { fill: #21252b; }
      .menu { fill: #1a1d23; }
      .tab-session { fill: #4ec9b0; }
      .tab-text-session { fill: #0d1117; }
      .tab-active { fill: #0b7aca; }
      .tab-text-active { fill: #ffffff; }
      .tab-inactive { fill: #21252b; }
      .tab-text-inactive { fill: #cccccc; opacity: 0.8; }
      .status { fill: #3a3e48; }
      .term { fill: #282c34; }
      .fg { fill: #cccccc; }
      .comment { fill: #9da5b4; }
      .prompt { fill: #4ec9b0; }
      .branch { fill: #f0a868; }
      .add { fill: #4ec9b0; }
      .del { fill: #f44748; }
      .info { fill: #93c5fd; }
      .sep { fill: #626977; }
      .mac-red { fill: #ff5f57; }
      .mac-yellow { fill: #febc2e; }
      .mac-green { fill: #28c840; }
      .mono {
        font-family: "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;
        font-size: 17px;
      }
      .mono-status { font-size: 15px; }
      .mono-tab { font-size: 15px; font-weight: 600; }
      .bold { font-weight: 700; }
      .cursor { fill: #cccccc; animation: blink 1s linear infinite; }
      @keyframes blink {
        0%, 40% { opacity: 0; }
        50%, 90% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
    <clipPath id="clip">
      <rect x="0" y="0" width="1200" height="760" rx="16" />
    </clipPath>
